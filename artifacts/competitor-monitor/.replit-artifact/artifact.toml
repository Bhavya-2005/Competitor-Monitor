kind = "web"
previewPath = "/"
title = "Competitor Monitor"
version = "1.0.0"
id = "artifacts/competitor-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25318

[services.development]
run = "pnpm --filter @workspace/competitor-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/competitor-monitor", "run", "build" ]
publicDir = "artifacts/competitor-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25318"
BASE_PATH = "/"
